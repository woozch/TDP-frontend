services:
  tdp-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

  tdp-frontend-dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    volumes:
      - ./:/app
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
